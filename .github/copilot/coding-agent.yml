# Pre-firewall setup steps run before network restrictions are applied.
pre_install:
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Make Gradle wrapper executable
      run: chmod +x ./gradlew

    - name: Restore Gradle dependency cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-

firewall:
  allowed_hosts:
    # ── Gradle infrastructure ──────────────────────────────────────
    - services.gradle.org
    - plugins.gradle.org
    - downloads.gradle-dn.com
    - downloads.gradle.org
    # ── Maven repositories ─────────────────────────────────────────
    - repo1.maven.org
    - repo.maven.apache.org
    # ── Google / Android ───────────────────────────────────────────
    - dl.google.com
    - maven.google.com
    # ── GitHub Packages (for Amazon IAP SDK) ───────────────────────
    - maven.pkg.github.com

